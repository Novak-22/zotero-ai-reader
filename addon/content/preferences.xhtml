<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })">
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- Default Provider -->
  <hbox>
    <html:label for="default-provider" data-l10n-id="pref-default-provider"></html:label>
    <html:select id="default-provider" preference="defaultProvider">
      <html:option value="openai">OpenAI</html:option>
      <html:option value="claude">Claude</html:option>
      <html:option value="ollama">Ollama</html:option>
      <html:option value="generic">Generic API</html:option>
    </html:select>
  </hbox>

  <!-- OpenAI Settings -->
  <groupbox>
    <caption><label data-l10n-id="pref-openai-title"></label></caption>
    <hbox>
      <html:label for="api-key-openai" data-l10n-id="pref-api-key"></html:label>
      <html:input type="password" id="api-key-openai" preference="apiKey.openai" style="width: 300px;"/>
    </hbox>
    <hbox>
      <html:label for="model-openai" data-l10n-id="pref-model"></html:label>
      <html:input type="text" id="model-openai" preference="model.openai"/>
    </hbox>
  </groupbox>

  <!-- Claude Settings -->
  <groupbox>
    <caption><label data-l10n-id="pref-claude-title"></label></caption>
    <hbox>
      <html:label for="api-key-claude" data-l10n-id="pref-api-key"></html:label>
      <html:input type="password" id="api-key-claude" preference="apiKey.claude" style="width: 300px;"/>
    </hbox>
    <hbox>
      <html:label for="model-claude" data-l10n-id="pref-model"></html:label>
      <html:input type="text" id="model-claude" preference="model.claude"/>
    </hbox>
  </groupbox>

  <!-- Ollama Settings -->
  <groupbox>
    <caption><label data-l10n-id="pref-ollama-title"></label></caption>
    <hbox>
      <html:label for="endpoint-ollama" data-l10n-id="pref-endpoint"></html:label>
      <html:input type="text" id="endpoint-ollama" preference="endpoint.ollama" style="width: 300px;"/>
    </hbox>
    <hbox>
      <html:label for="model-ollama" data-l10n-id="pref-model"></html:label>
      <html:input type="text" id="model-ollama" preference="model.ollama"/>
    </hbox>
  </groupbox>

  <!-- Generic API Settings -->
  <groupbox>
    <caption><label data-l10n-id="pref-generic-title"></label></caption>
    <hbox>
      <html:label for="api-key-generic" data-l10n-id="pref-api-key"></html:label>
      <html:input type="password" id="api-key-generic" preference="apiKey.generic" style="width: 300px;"/>
    </hbox>
    <hbox>
      <html:label for="endpoint-generic" data-l10n-id="pref-endpoint"></html:label>
      <html:input type="text" id="endpoint-generic" preference="endpoint.generic" style="width: 300px;"/>
    </hbox>
    <hbox>
      <html:label for="model-generic" data-l10n-id="pref-model"></html:label>
      <html:input type="text" id="model-generic" preference="model.generic"/>
    </hbox>
  </groupbox>

  <checkbox id="chat-history-enabled" preference="chatHistoryEnabled" data-l10n-id="pref-chat-history"/>
</groupbox>
<vbox>
  <html:label data-l10n-id="pref-help" data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'></html:label>
</vbox>
